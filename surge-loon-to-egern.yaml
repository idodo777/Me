name: 插件模块跳转
description: |
  插件中心跳Egern 只跳转不经过Script转换
  可莉插件网址：https://hub.kelee.one
  色鸡模块网址：https://surge.qingr.moe
  恩秀模块网址：https://loonlab.103516.xyz/Plugin/
  胖虎模块网址：https://kelvinlab.wuyra.com/

body_rewrites:
  - response_regex:
      match: https://(pluginhub|hub)\.kelee\.one/
      find: loon://import\?plugin=
      replace: egern:///modules/new?url=
  - response_regex:
      match: https://surge\.qingr\.moe/
      find: surge:///install-module\?url=
      replace: egern:///modules/new?url=
  - response_regex:
      match: https://(loonlab|loon)\.103516\.xyz\.Plugin/
      find: loon://import?plugin=
      replace: egern:///modules/new?url=
  - response_regex:
      match: https://kelvinlab\.wuyra\.com/
      find: surge:///install-module\?url=
      replace: egern:///modules/new?url=
mitm:
  hostnames:
    includes:
      - pluginhub.kelee.one
      - hub.kelee.one
      - surge.qingr.moe
      - loonlab.103516.xyz
      - kelvinlab.wuyra.com

